<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Crop Prediction</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: linear-gradient(to right, #56ab2f, #a8e063);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            width:400px;
            background:white;
            padding:30px;
            border-radius:20px;
            box-shadow:0px 8px 20px rgba(0,0,0,0.3);
            text-align:center;
        }

        h1{
            color:#2e7d32;
            margin-bottom:20px;
        }

        p{
            color:gray;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:10px;
            outline:none;
            font-size:15px;
        }

        input:focus{
            border-color:green;
        }

        button{
            width:100%;
            padding:12px;
            background:#2e7d32;
            color:white;
            border:none;
            border-radius:10px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#1b5e20;
        }

        .result{
            margin-top:20px;
            background:#e8f5e9;
            padding:15px;
            border-radius:10px;
            color:#1b5e20;
            font-size:20px;
            font-weight:bold;
        }

    </style>
</head>

<body>

    <div class="container">

        <h1>🌾 Smart Crop Prediction</h1>

        <p>Enter soil and climate details</p>

        <form method="POST">

            <input type="number" step="any" name="N" placeholder="Nitrogen Value" required>

            <input type="number" step="any" name="P" placeholder="Phosphorus Value" required>

            <input type="number" step="any" name="K" placeholder="Potassium Value" required>

            <input type="number" step="any" name="temperature" placeholder="Temperature" required>

            <input type="number" step="any" name="humidity" placeholder="Humidity" required>

            <input type="number" step="any" name="ph" placeholder="pH Value" required>

            <input type="number" step="any" name="rainfall" placeholder="Rainfall" required>

            <button type="submit">Predict Crop</button>

        </form>

        {% if prediction %}

        <div class="result">
            Recommended Crop: {{ prediction }}
        </div>

        {% endif %}

    </div>

</body>
</html>
